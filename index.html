<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>用药打卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f2f2f7;
  --card: #fff;
  --text: #1c1c1e;
  --sub: #8e8e93;
  --sep: #e5e5ea;
  --blue: #007aff;
  --green: #34c759;
  --orange: #ff9500;
  --purple: #af52de;
  --red: #ff3b30;
}

body {
  background: var(--bg);
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 90px;
}

/* ── Header ── */
.header {
  padding: 54px 20px 12px;
}
.header-top {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.header h1 {
  font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em;
}
.header .date {
  font-size: .78rem; color: var(--sub); margin-top: 5px;
}
.day-chip {
  background: var(--blue); color: #fff;
  font-size: .7rem; font-weight: 700;
  padding: 4px 10px; border-radius: 99px;
  margin-top: 4px;
  white-space: nowrap;
}

/* ── All done banner ── */
.done-banner {
  margin: 0 16px 12px;
  background: var(--green);
  border-radius: 12px;
  padding: 11px 16px;
  color: #fff;
  font-size: .88rem;
  font-weight: 600;
  text-align: center;
  display: none;
}
.done-banner.show { display: block; }

/* ── Notice ── */
.notice {
  margin: 0 16px 16px;
  background: #fffbe6;
  border-left: 3px solid #ff9500;
  border-radius: 0 10px 10px 0;
  padding: 8px 12px;
  font-size: .72rem;
  color: #7a5000;
  line-height: 1.6;
}

/* ── Section label ── */
.sec-label {
  font-size: .68rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--sub);
  padding: 4px 20px 8px;
}

/* ── Med card ── */
.med-card {
  margin: 0 16px 10px;
  background: var(--card);
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.med-card.ended { opacity: .4; pointer-events: none; }
.med-card.skip-today { opacity: .55; }

/* top row */
.card-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.color-bar {
  width: 4px; height: 36px; border-radius: 99px; flex-shrink: 0;
}
.med-info { flex: 1; }
.med-name { font-size: .97rem; font-weight: 700; }
.med-desc { font-size: .7rem; color: var(--sub); margin-top: 2px; }
.course-tag {
  font-size: .65rem; font-weight: 700;
  padding: 3px 9px; border-radius: 99px;
  white-space: nowrap;
}

/* dose row */
.dose-row {
  display: flex; align-items: center; gap: 8px;
}
.dose-dots {
  display: flex; gap: 6px; flex: 1;
}
.dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--sep);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; color: var(--sub);
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
}
.dot:active { transform: scale(.88); }
.dot.filled {
  border-color: var(--c);
  background: var(--c);
  color: #fff;
  font-size: .85rem;
}

.dose-label {
  font-size: .72rem; color: var(--sub); white-space: nowrap;
  font-weight: 500;
}
.dose-label.complete { color: var(--green); font-weight: 700; }

/* skip message */
.skip-msg {
  font-size: .72rem; color: var(--sub);
  text-align: center; padding: 4px 0 0;
  display: none;
}
.skip-msg.show { display: block; }

/* ── Tab bar ── */
.tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--sep);
  display: flex;
  padding: 8px 0 env(safe-area-inset-bottom, 10px);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; cursor: pointer;
  color: var(--sub); font-family: 'Noto Sans SC', sans-serif; padding: 4px 0;
  transition: color .15s;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { font-size: 1.35rem; }
.tab-label { font-size: .6rem; font-weight: 600; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── History ── */
.hist-wrap { padding: 0 0 10px; }
.hist-day { margin: 0 16px 12px; }
.hist-date { font-size: .68rem; font-weight: 700; color: var(--sub); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 7px; padding-left: 2px; }
.hist-card { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.hist-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--sep); }
.hist-row:last-child { border-bottom: none; }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hist-name { font-size: .84rem; flex: 1; }
.hist-count { font-size: .72rem; color: var(--sub); }
.hist-icon { font-size: .9rem; }
.empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: .88rem; line-height: 1.9; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: rgba(28,28,30,.88); backdrop-filter: blur(8px);
  color: #fff; padding: 9px 20px; border-radius: 99px;
  font-size: .8rem; font-weight: 500;
  opacity: 0; transition: all .22s; z-index: 999;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Setup ── */
.setup {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  display: flex; align-items: flex-end; z-index: 500;
}
.setup-sheet {
  background: #fff; width: 100%; max-width: 430px; margin: 0 auto;
  border-radius: 24px 24px 0 0; padding: 26px 20px 48px;
}
.setup-sheet h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
.setup-sheet p { font-size: .8rem; color: var(--sub); line-height: 1.6; margin-bottom: 20px; }
.setup-label { font-size: .76rem; font-weight: 600; margin-bottom: 8px; }
.setup-input {
  width: 100%; border: 1.5px solid var(--sep); border-radius: 10px;
  padding: 11px 13px; font-size: .93rem; font-family: 'Noto Sans SC', sans-serif;
  color: var(--text); background: var(--bg); outline: none; margin-bottom: 16px;
}
.setup-input:focus { border-color: var(--blue); }
.setup-go {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: var(--blue); color: #fff;
  font-size: .95rem; font-weight: 700; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;
}
</style>
</head>
<body>

<!-- Setup -->
<div class="setup" id="setup">
  <div class="setup-sheet">
    <h2>💊 用药打卡</h2>
    <p>已根据处方设置好所有药品信息，确认开始用药日期即可使用。</p>
    <div class="setup-label">开始用药日期（眼药水 + 异维A酸同步开始）</div>
    <input type="date" class="setup-input" id="setupDate">
    <button class="setup-go" onclick="startApp()">开始打卡</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Today -->
  <div class="page active" id="pg-today">

    <div class="header">
      <div class="header-top">
        <div>
          <h1>今日用药</h1>
          <div class="date" id="dateLabel"></div>
        </div>
        <div class="day-chip" id="dayChip">第1天</div>
      </div>
    </div>

    <div class="done-banner" id="doneBanner">🎉 今日全部用药完成！</div>

    <div class="notice">💡 连续滴两种眼药水需间隔 <strong>5–10 分钟</strong></div>

    <div class="sec-label">眼药水</div>

    <!-- 埃美丁 -->
    <div class="med-card" id="mc0">
      <div class="card-top">
        <div class="color-bar" style="background:#007aff"></div>
        <div class="med-info">
          <div class="med-name">埃美丁</div>
          <div class="med-desc">富马酸依美斯汀 · 每日3次 · 0.05ml</div>
        </div>
        <div class="course-tag" id="tag0" style="background:#e8f3ff;color:#007aff"></div>
      </div>
      <div class="dose-row">
        <div class="dose-dots" id="dots0" style="--c:#007aff"></div>
        <div class="dose-label" id="dlabel0">0 / 3</div>
      </div>
    </div>

    <!-- 新泪然 -->
    <div class="med-card" id="mc1">
      <div class="card-top">
        <div class="color-bar" style="background:#34c759"></div>
        <div class="med-info">
          <div class="med-name">新泪然</div>
          <div class="med-desc">羟糖甘滴眼液 · 每日4次 · 0.25ml</div>
        </div>
        <div class="course-tag" id="tag1" style="background:#eafaf1;color:#34c759">长期</div>
      </div>
      <div class="dose-row">
        <div class="dose-dots" id="dots1" style="--c:#34c759"></div>
        <div class="dose-label" id="dlabel1">0 / 4</div>
      </div>
    </div>

    <!-- 普拉洛芬 -->
    <div class="med-card" id="mc2">
      <div class="card-top">
        <div class="color-bar" style="background:#ff9500"></div>
        <div class="med-info">
          <div class="med-name">普拉洛芬</div>
          <div class="med-desc">普拉洛芬滴眼液 · 每日4次 · 0.05ml</div>
        </div>
        <div class="course-tag" id="tag2" style="background:#fff4e6;color:#ff9500"></div>
      </div>
      <div class="dose-row">
        <div class="dose-dots" id="dots2" style="--c:#ff9500"></div>
        <div class="dose-label" id="dlabel2">0 / 4</div>
      </div>
    </div>

    <div class="sec-label">胶囊</div>

    <!-- 异维A酸 -->
    <div class="med-card" id="mc3">
      <div class="card-top">
        <div class="color-bar" style="background:#af52de"></div>
        <div class="med-info">
          <div class="med-name">异维A酸胶囊</div>
          <div class="med-desc">每两天1颗 · 连续2个月</div>
        </div>
        <div class="course-tag" id="tag3" style="background:#f5eeff;color:#af52de"></div>
      </div>
      <div class="dose-row">
        <div class="dose-dots" id="dots3" style="--c:#af52de"></div>
        <div class="dose-label" id="dlabel3"></div>
      </div>
      <div class="skip-msg" id="skipMsg3">💤 今天不用吃，明天再吃</div>
    </div>

  </div>

  <!-- History -->
  <div class="page" id="pg-history">
    <div class="header"><h1>打卡记录</h1></div>
    <div class="hist-wrap" id="histWrap">
      <div class="empty">📭 还没有记录<br>打卡后会显示在这里</div>
    </div>
  </div>

  <!-- Tabbar -->
  <div class="tabbar">
    <button class="tab-btn active" onclick="showPage('today',this)">
      <span class="tab-icon">💊</span><span class="tab-label">今日</span>
    </button>
    <button class="tab-btn" onclick="showPage('history',this)">
      <span class="tab-icon">📋</span><span class="tab-label">记录</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ─────────────────────────────────────────
const MEDS = [
  { id:0, name:'埃美丁',   color:'#007aff', total:3, limitDays:7,  every:1 },
  { id:1, name:'新泪然',   color:'#34c759', total:4, limitDays:0,  every:1 },
  { id:2, name:'普拉洛芬', color:'#ff9500', total:4, limitDays:7,  every:1 },
  { id:3, name:'异维A酸', color:'#af52de', total:1, limitDays:60, every:2 },
];
const KEY = 'meds_v5';
let S = {};

// ─── Utils ──────────────────────────────────────────
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const daysBetween = (a, b) => Math.floor((new Date(b) - new Date(a)) / 86400000);
const load = () => { try { S = JSON.parse(localStorage.getItem(KEY) || 'null') || {}; } catch(e) { S = {}; } };
const save = () => localStorage.setItem(KEY, JSON.stringify(S));

// ─── Setup ──────────────────────────────────────────
function startApp() {
  const d = document.getElementById('setupDate').value;
  if (!d) { showToast('请选择日期'); return; }
  S = { startDate: d, history: {} };
  save();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderToday();
}

// ─── Render Today ────────────────────────────────────
function renderToday() {
  const today = todayStr();
  if (!S.history) S.history = {};
  if (!S.history[today]) S.history[today] = {};
  const H = S.history[today];
  const dayIdx = daysBetween(S.startDate, today);

  // Header
  const now = new Date();
  const wk = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dateLabel').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${wk[now.getDay()]}`;
  document.getElementById('dayChip').textContent = `第 ${dayIdx+1} 天`;

  let allActiveDone = true;

  MEDS.forEach(m => {
    const mc = document.getElementById('mc' + m.id);
    const dotsEl = document.getElementById('dots' + m.id);
    const dlabel = document.getElementById('dlabel' + m.id);
    const tag = document.getElementById('tag' + m.id);
    const skipMsg = document.getElementById('skipMsg' + m.id);

    const done = H[m.id] || 0;
    const ended = m.limitDays > 0 && dayIdx >= m.limitDays;
    const isSkipDay = m.every === 2 && dayIdx % 2 !== 0;

    // Course tag
    if (m.limitDays > 0) {
      if (ended) {
        tag.textContent = '已停药';
        tag.style.background = '#f2f2f7'; tag.style.color = '#8e8e93';
      } else {
        const rem = m.limitDays - dayIdx;
        tag.textContent = `剩 ${rem} 天`;
        if (rem <= 2) { tag.style.background = '#ffeeee'; tag.style.color = '#ff3b30'; }
      }
    }

    // Card states
    mc.classList.toggle('ended', ended);
    if (skipMsg) skipMsg.classList.toggle('show', isSkipDay && !ended);

    // Build dots
    dotsEl.innerHTML = '';
    if (ended) {
      dlabel.textContent = '疗程结束';
      dlabel.className = 'dose-label';
      return;
    }
    if (isSkipDay) {
      dlabel.textContent = '今日免服';
      dlabel.className = 'dose-label';
      return; // don't count toward allDone
    }

    for (let i = 0; i < m.total; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < done ? ' filled' : '');
      d.textContent = i < done ? '✓' : i + 1;
      d.onclick = () => tapDot(m.id, i);
      dotsEl.appendChild(d);
    }

    if (done >= m.total) {
      dlabel.textContent = '✓ 完成';
      dlabel.className = 'dose-label complete';
    } else {
      dlabel.textContent = `${done} / ${m.total}`;
      dlabel.className = 'dose-label';
      allActiveDone = false;
    }
  });

  document.getElementById('doneBanner').classList.toggle('show', allActiveDone);
}

// ─── Tap dot ────────────────────────────────────────
function tapDot(medId, dotIdx) {
  const today = todayStr();
  if (!S.history[today]) S.history[today] = {};
  const H = S.history[today];
  const m = MEDS[medId];
  const dayIdx = daysBetween(S.startDate, today);

  if (m.limitDays > 0 && dayIdx >= m.limitDays) { showToast('疗程已结束'); return; }
  if (m.every === 2 && dayIdx % 2 !== 0) { showToast('今天不用服用'); return; }

  const cur = H[medId] || 0;

  if (dotIdx < cur) {
    // tap filled dot → undo to this position
    H[medId] = dotIdx;
    showToast('已撤销');
  } else {
    // tap unfilled dot → fill up to dotIdx+1
    H[medId] = dotIdx + 1;
    if (H[medId] === m.total) showToast(`✅ ${m.name} 今日完成！`);
    else if (m.every === 1) showToast('💧 已记录，记得间隔5分钟');
    else showToast('💊 已记录');
  }
  save();
  renderToday();
}

// ─── History ────────────────────────────────────────
function renderHistory() {
  const wrap = document.getElementById('histWrap');
  if (!S.history || !Object.keys(S.history).length) {
    wrap.innerHTML = '<div class="empty">📭 还没有记录<br>打卡后会显示在这里</div>';
    return;
  }
  const days = Object.keys(S.history).sort().reverse();
  const wk = ['日','一','二','三','四','五','六'];
  let html = '';
  days.forEach(day => {
    const H = S.history[day];
    const di = daysBetween(S.startDate, day);
    const d = new Date(day);
    const label = `${d.getMonth()+1}月${d.getDate()}日（周${wk[d.getDay()]}）· 第${di+1}天`;
    html += `<div class="hist-day"><div class="hist-date">${label}</div><div class="hist-card">`;
    MEDS.forEach(m => {
      const done = H[m.id] || 0;
      const ended = m.limitDays > 0 && di >= m.limitDays;
      const skipDay = m.every === 2 && di % 2 !== 0;
      let icon, count;
      if (ended) { icon = '—'; count = '已停药'; }
      else if (skipDay) { icon = '💤'; count = '今日免服'; }
      else if (done >= m.total) { icon = '✅'; count = `${done}/${m.total} 次`; }
      else if (done > 0) { icon = '⭕'; count = `${done}/${m.total} 次`; }
      else { icon = '❌'; count = '未打卡'; }
      html += `<div class="hist-row">
        <div class="hist-dot" style="background:${m.color}"></div>
        <div class="hist-name">${m.name}</div>
        <div class="hist-count">${count}</div>
        <div class="hist-icon">${icon}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  wrap.innerHTML = html;
}

// ─── Nav ────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pg-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'today') renderToday();
}

// ─── Toast ──────────────────────────────────────────
let _t;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_t);
  _t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── Boot ───────────────────────────────────────────
(function () {
  load();
  document.getElementById('setupDate').value = todayStr();
  if (S.startDate) {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderToday();
  }
})();
</script>
</body>
</html>
